name: Publish

on:
  workflow_dispatch:
    branches:
      - main

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      packages: write
      issues: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .tool-versions
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build project
        run: bun run build

      - name: Get version
        id: version
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION"

      # Phase 1: GitHub Release
      - name: Check if GitHub Release exists
        id: check-release
        run: |
          VERSION=${{ steps.version.outputs.version }}
          if gh release view v$VERSION >/dev/null 2>&1; then
            echo "ℹ️  GitHub Release v$VERSION already exists - skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "✅ GitHub Release v$VERSION does not exist - will create"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Git Tag
        if: steps.check-release.outputs.skip != 'true'
        run: |
          VERSION=${{ steps.version.outputs.version }}
          if ! git rev-parse v$VERSION >/dev/null 2>&1; then
            git tag v$VERSION
            git push origin v$VERSION
            echo "✅ Created and pushed tag v$VERSION"
          else
            echo "ℹ️  Tag v$VERSION already exists"
          fi

      - name: Package skill for release
        if: steps.check-release.outputs.skip != 'true'
        run: |
          cd skills/freee-cli-skill
          zip -r ../../freee-cli-skill.zip .
          echo "✅ Packaged skill"

      - name: Create GitHub Release
        if: steps.check-release.outputs.skip != 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            ## What's Changed

            See [CHANGELOG.md](./CHANGELOG.md) for details.

            ## Package
            - npm: https://www.npmjs.com/package/@yamitzky/freee/v/${{ steps.version.outputs.version }}
            - Install: `npm install @yamitzky/freee@${{ steps.version.outputs.version }}`

            ## Claude Plugin
            This repository can also be used as a Claude Code plugin:
            ```bash
            claude plugin install yamitzky/freee-cli
            ```
          files: freee-cli-skill.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Phase 2: npm publish
      - name: Check if npm package exists
        id: check-npm
        run: |
          VERSION=${{ steps.version.outputs.version }}
          if npm view @yamitzky/freee@$VERSION version 2>/dev/null; then
            echo "ℹ️  npm package @yamitzky/freee@$VERSION already exists - skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "✅ npm package @yamitzky/freee@$VERSION does not exist - will publish"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm (Trusted Publishing)
        if: steps.check-npm.outputs.skip != 'true'
        run: bun run release
        env:
          NPM_CONFIG_PROVENANCE: true

      - name: Sync plugin.json version
        if: steps.check-npm.outputs.skip != 'true'
        run: |
          VERSION=${{ steps.version.outputs.version }}
          jq --arg v "$VERSION" '.version = $v' .claude-plugin/plugin.json > tmp.json && mv tmp.json .claude-plugin/plugin.json
          jq --arg v "$VERSION" '.plugins[0].version = $v' .claude-plugin/marketplace.json > tmp.json && mv tmp.json .claude-plugin/marketplace.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/
          git commit -m "chore: sync plugin version to $VERSION" || echo "No changes to commit"
          git push
          echo "✅ Synced plugin.json version"
